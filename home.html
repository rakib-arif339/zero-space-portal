<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", "Arial", sans-serif;
        }

        body {
            background-color: #e0e5ec;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVBAR STYLING --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #e0e5ec;
            box-shadow: 6px 6px 12px #a3b1c6, -6px -6px 12px #ffffff;
            z-index: 100;
        }

        .navbar h1 {
            color: #053146;
            font-size: 24px;
        }

        .btn-logout {
            padding: 10px 24px;
            background: #e0e5ec;
            color: #e65e5e;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 4px 4px 8px #a3b1c6, -4px -4px 8px #ffffff;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-logout:active {
            box-shadow: inset 4px 4px 8px #a3b1c6, inset -4px -4px 8px #ffffff;
            transform: scale(0.98);
        }

        /* --- DASHBOARD LAYOUT --- */
        .dashboard-container {
            padding: 40px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .welcome-section {
            grid-column: 1 / -1;
            margin-bottom: 20px;
        }

        .welcome-section h2 {
            color: #053146;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .welcome-section p {
            color: #64748b;
            font-size: 16px;
        }

        /* --- CARDS --- */
        .card {
            background: #e0e5ec;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card h3 {
            color: #334155;
            font-size: 18px;
            border-bottom: 2px solid #a3b1c6;
            padding-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #053146;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>Admin Portal</h1>
        <a href="index.html" class="btn-logout">Log Out</a>
    </nav>

    <main class="dashboard-container">
        
        <div class="welcome-section">
            <h2>Welcome Back, Rakib Sir.</h2>
            <p>Here is an overview of your system status today.</p>
        </div>

        <div class="card">
            <h3>Active Users</h3>
            <span class="stat-value">1,248</span>
            <span class="stat-label">+12% from last week</span>
        </div>

        <div class="card">
            <h3>System Performance</h3>
            <span class="stat-value">99.8%</span>
            <span class="stat-label">Optimal Server Health</span>
        </div>

        <div class="card">
            <h3>Recent Alerts</h3>
            <span class="stat-value" style="color: #e65e5e;">2</span>
            <span class="stat-label">Requires your attention</span>
        </div>

    </main>

</body>
</html>
